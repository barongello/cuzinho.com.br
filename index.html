<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuzinho</title>
    <style type="text/css">
      body {
        background-position: center center;
        background-repeat: no-repeat;
        background-size: 40%;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: end;
        margin: 0;
        border: 0;
        padding: 0;
      }

      a {
        display: none;
      }

      .counter {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1dvw;
        margin-bottom: 1dvh;
        color: silver;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1em;
        flex-wrap: wrap;
        text-align: center;
        opacity: 0;
      }

      .counter:hover {
        color: gray;
        text-decoration: underline;
        cursor: pointer;
      }

      img[src^="//"] {
        display: none !important;
        opacity: 0;
      }

      div[id^="error_"] {
        display: none !important;
        opacity: 0 !important;
        position: absolute !important;
        left: 100dvw !important;
        top: 100dvh !important;
      }
    </style>
  </head>

  <body>
    <div class="counter">
      <span>
        Você é o visitante número
      </span>

      <a href='http://www.freevisitorcounters.com'>freevisitorcounters</a> <script type='text/javascript' src='https://www.freevisitorcounters.com/auth.php?id=78f9fdfc9f08f84059bb6f09003d8d4e19797a0d'></script>
      <script type="text/javascript" src="https://www.freevisitorcounters.com/en/home/counter/1535977/t/5"></script>
      <script type="text/javascript">
        async function sleep(ms) {
          return new Promise(resolve => {
            setTimeout(resolve, ms);
          });
        }

        async function doTheThing() {
          let imgs = [];

          while (imgs.length === 0) {
            imgs = document.querySelectorAll('img');

            await sleep(10);
          }

          const img = imgs[0];
          const parent = img.parentNode;

          parent.parentNode.appendChild(img);
          parent.parentNode.replaceChild(img, parent);

          let counter = null;

          while (counter === null) {
            counter = document.querySelector('.counter');

            await sleep(10);
          }

          document.querySelectorAll('a').forEach(element => element.remove());

          document.querySelectorAll('img').forEach(element => {
            console.log('ddd', element.src)
            if (element.src.startsWith('//') === false) {
              return;
            }
console.log('MIJEI')
            element.remove();
          });

          document.querySelector('.counter').style.opacity = 1;
        }

        doTheThing();
      </script>

      <span>
        a entrar no cuzinho! ❤️
      </span>
    </div>
    <script type="text/javascript">
      const KEYS = [0x55, 0xAA];

      fetch('bg.bin')
        .then(response => response.arrayBuffer())
        .then(buf => {
          buf = new Uint8Array(buf);
          output = new Uint8Array(buf.length);

          let ki = 0;

          for (let i = 0; i < buf.length; ++i) {
            output[i] = buf[i] ^ KEYS[ki];

            ki ^= 1;
          }

          const imageData = `data:image/png;base64,${output.toBase64()}`;

          document.body.style.backgroundImage = `url("${imageData}")`;
        });
    </script>
