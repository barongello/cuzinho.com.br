<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuzinho</title>
    <style type="text/css">
      body {
        background-position: center center;
        background-repeat: no-repeat;
        background-size: 40%;
        width: 100dvw;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: end;
        margin: 0;
        border: 0;
        padding: 0;
      }

      .counter {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1dvw;
        margin-bottom: 1dvh;
        color: silver;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1em;
        flex-wrap: wrap;
        text-align: center;
      }

      .counter:hover {
        color: gray;
        text-decoration: underline;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="counter">
      <span>
        Você é o visitante número
      </span>

      <img src="https://www.freevisitorcounters.com/en/counter/render/1535964/t/5" border="0" class="counterimg">

      <span>
        a entrar no cuzinho! ❤️
      </span>
    </div>
    <script type="text/javascript">
      const KEYS = [0x55, 0xAA];

      fetch('bg.bin')
        .then(response => response.arrayBuffer())
        .then(buf => {
          buf = new Uint8Array(buf);
          output = new Uint8Array(buf.length);

          let ki = 0;

          for (let i = 0; i < buf.length; ++i) {
            output[i] = buf[i] ^ KEYS[ki];

            ki ^= 1;
          }

          const imageData = `data:image/png;base64,${output.toBase64()}`;

          document.body.style.backgroundImage = `url("${imageData}")`;
        });
    </script>
  </body>
</html>
